      <!-- HERO -->

        <p class="eyebrow">PROJECT</p>

        <h1>kNN Classification for Breast Cancer Diagnosis</h1>

        <p class="project-subtitle">
          Built a custom k-nearest neighbors classifier to distinguish malignant and benign breast cancer samples using normalized diagnostic features.
        </p>
      </section>

      <!-- OVERVIEW -->
      <section class="project-section">
        <h2>Project Overview</h2>

        <p>
          This project applies a k-nearest neighbors classification workflow to the Wisconsin Diagnostic Breast Cancer dataset.
          The analysis focuses on building the model from the ground up, selecting an optimal k value, and evaluating performance using cross-validation, ROC/AUC, and final test-set metrics.
        </p>
      </section>

      <!-- KEY RESULTS -->
      <section class="project-section">
        <h2>Key Results</h2>

        <div class="findings-grid">
          <div class="finding-card">
            <h3>95.6%</h3>
            <p>Final test accuracy using the selected k value.</p>
          </div>

          <div class="finding-card">
            <h3>0.979</h3>
            <p>AUC score on the test set, showing strong class separation.</p>
          </div>

          <div class="finding-card">
            <h3>k = 3</h3>
            <p>Optimal k selected using repeated 10-fold cross-validation.</p>
          </div>

          <div class="finding-card">
            <h3>Leak-Free Scaling</h3>
            <p>Z-score normalization was fit only on training data and applied to test data.</p>
          </div>
        </div>
      </section>

      <!-- WORKFLOW -->
      <section class="project-section">
        <h2>Basic Workflow Diagram</h2>
        <div class="workflow-image">

      <!-- WHAT I BUILT -->
      <section class="project-section">
        <h2>What I Built</h2>

        <ul class="project-bullets">
          <li>Implemented core kNN helper functions for distance calculation, neighbor selection, label prediction, and batch prediction.</li>
          <li>Used z-score normalization based only on the training set to avoid data leakage.</li>
          <li>Evaluated odd k values from 1 to 51 and confirmed model choice using repeated 10-fold cross-validation.</li>
          <li>Calculated ROC curve and AUC to measure model discrimination beyond accuracy alone.</li>
          <li>Reported final confusion-matrix metrics including true positives, true negatives, false positives, and false negatives.</li>
        </ul>
      </section>

      <!-- METHODS -->
      <section class="project-section">
        <h2>Modeling Details</h2>

        <div class="method-grid">
          <div class="method-card">
            <h3>Distance Metric</h3>
            <p>Euclidean distance was used to measure similarity between normalized samples.</p>
          </div>

          <div class="method-card">
            <h3>Target Classes</h3>
            <p>Diagnosis was modeled as a two-class outcome: malignant and benign.</p>
          </div>

          <div class="method-card">
            <h3>Model Selection</h3>
            <p>Repeated 10-fold cross-validation was used to select a more reliable k value.</p>
          </div>

          <div class="method-card">
            <h3>Evaluation</h3>
            <p>Performance was evaluated using accuracy, confusion-matrix counts, ROC curve, and AUC.</p>
          </div>
        </div>
      </section>

      <!-- INTERPRETATION -->
      <section class="project-section">
        <h2>Interpretation</h2>

        <p>
          The final model achieved strong classification performance, with high accuracy and an AUC close to 1.
          The cross-validation results selected k = 3, which provided a more reliable choice than simply using the highest test-set accuracy from a single split.
          This project demonstrates the full machine learning workflow from preprocessing and model construction to validation and performance interpretation.
        </p>
      </section>
